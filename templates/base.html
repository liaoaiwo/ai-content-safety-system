<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Chat 安全监测系统{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
        }

        .logo i {
            font-size: 1.6rem;
            color: #00d4ff;
        }

        .logo span {
            background: linear-gradient(135deg, #00d4ff, #7b2eda);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #aaa;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .nav-link i {
            font-size: 1rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #00d4ff, #7b2eda);
            color: white;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* 通用卡片样式 */
        .card {
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        .card h3 {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h3 i {
            color: #00d4ff;
        }

        /* 按钮样式 */
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2eda);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* 徽章样式 */
        .badge-pass {
            background: rgba(0, 200, 100, 0.15);
            color: #00c864;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid rgba(0, 200, 100, 0.3);
        }

        .badge-block {
            background: rgba(255, 80, 80, 0.15);
            color: #ff5050;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid rgba(255, 80, 80, 0.3);
        }

        /* 统计数字 */
        .stat-number {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2eda);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .nav-links {
                gap: 4px;
            }
            .nav-link {
                padding: 6px 12px;
                font-size: 12px;
            }
            .nav-link span {
                display: none;
            }
            .nav-link i {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 768px) {
            .nav-container {
                padding: 0 15px;
            }
            .container {
                padding: 15px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <span>SafeGuard<span style="color:white;"> AI</span></span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link" data-page="dashboard">
                    <i class="fas fa-chart-line"></i>
                    <span>仪表盘</span>
                </a>
                <a href="/chat" class="nav-link" data-page="chat">
                    <i class="fas fa-comments"></i>
                    <span>AI聊天</span>
                </a>
                <a href="/logs" class="nav-link" data-page="logs">
                    <i class="fas fa-history"></i>
                    <span>安全日志</span>
                </a>
                <a href="/security" class="nav-link" data-page="security">
                    <i class="fas fa-shield-virus"></i>
                    <span>安全监控</span>
                </a>
                <a href="/test" class="nav-link" data-page="test">
                    <i class="fas fa-flask"></i>
                    <span>安全测试</span>
                </a>
                <a href="/experiment" class="nav-link" data-page="experiment">
                    <i class="fas fa-chart-bar"></i>
                    <span>对比实验</span>
                </a>
                <!-- 采样统计按钮 -->
                <a href="/sampling" class="nav-link" data-page="sampling">
                    <i class="fas fa-chart-simple"></i>
                    <span>采样统计</span>
                </a>
                <a href="/settings" class="nav-link" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>设置</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // 高亮当前页面
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPath || (currentPath === '/' && href === '/')) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                right: 30px;
                background: ${type === 'error' ? 'rgba(255,80,80,0.9)' : 'rgba(0,200,100,0.9)'};
                backdrop-filter: blur(10px);
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                z-index: 9999;
                font-size: 14px;
                border: 1px solid rgba(255,255,255,0.1);
                animation: fadeInOut 2.5s forwards;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
    <style>
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(0) translateY(20px); }
            15% { opacity: 1; transform: translateX(0) translateY(0); }
            85% { opacity: 1; transform: translateX(0) translateY(0); }
            100% { opacity: 0; transform: translateX(0) translateY(20px); }
        }
    </style>
    {% block extra_js %}{% endblock %}
</body>
</html>
