{% extends "base.html" %}

{% block title %}安全监控 - SafeGuard AI{% endblock %}

{% block extra_css %}
<style>
    .severity-critical { color: #ff0000; background: rgba(255,0,0,0.15); }
    .severity-high { color: #ff5050; background: rgba(255,80,80,0.12); }
    .severity-medium { color: #ff8c00; background: rgba(255,140,0,0.1); }
    .severity-low { color: #ffcc00; background: rgba(255,204,0,0.08); }

    .attack-badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
    }

    .live-indicator {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(0,212,255,0.15);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        color: #00d4ff;
    }

    .live-dot {
        width: 8px;
        height: 8px;
        background: #00ff00;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
    }

    .stat-card {
        text-align: center;
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .stat-card:hover {
        transform: translateY(-3px);
        border-color: rgba(0,212,255,0.5);
    }
    .stat-number {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #00d4ff, #7b2eda);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
</style>
{% endblock %}

{% block content %}
<div style="margin-bottom: 25px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h1 style="color: white; font-size: 1.8rem; font-weight: 600;">安全监控中心</h1>
            <p style="color: #888; margin-top: 8px;">实时攻击检测 · 威胁情报 · 自动告警</p>
        </div>
        <div class="live-indicator">
            <span class="live-dot"></span>
            <span>实时监控中</span>
        </div>
    </div>
</div>

<!-- 统计卡片 -->
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">
    <div class="card stat-card" onclick="filterBySeverity('all')">
        <i class="fas fa-skull-crossbones" style="font-size: 2rem; color: #ff5050; margin-bottom: 10px;"></i>
        <div class="stat-number" id="attackTotal">0</div>
        <div style="color: #888; font-size: 0.85rem; margin-top: 5px;">总攻击次数</div>
    </div>
    <div class="card stat-card" onclick="filterBySeverity('critical')">
        <i class="fas fa-biohazard" style="font-size: 2rem; color: #ff0000; margin-bottom: 10px;"></i>
        <div class="stat-number" id="criticalCount">0</div>
        <div style="color: #888; font-size: 0.85rem; margin-top: 5px;">极端威胁</div>
    </div>
    <div class="card stat-card" onclick="filterBySeverity('high')">
        <i class="fas fa-bug" style="font-size: 2rem; color: #ff8c00; margin-bottom: 10px;"></i>
        <div class="stat-number" id="jailbreakCount">0</div>
        <div style="color: #888; font-size: 0.85rem; margin-top: 5px;">越狱攻击</div>
    </div>
    <div class="card stat-card" onclick="filterBySeverity('medium')">
        <i class="fas fa-syringe" style="font-size: 2rem; color: #7b2eda; margin-bottom: 10px;"></i>
        <div class="stat-number" id="injectionCount">0</div>
        <div style="color: #888; font-size: 0.85rem; margin-top: 5px;">提示注入</div>
    </div>
</div>

<!-- 实时攻击趋势图 -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px;">
    <div class="card">
        <h3><i class="fas fa-chart-line"></i> 攻击趋势（最近24小时）</h3>
        <div id="attackTrendChart" style="height: 280px;"></div>
    </div>
    <div class="card">
        <h3><i class="fas fa-chart-pie"></i> 攻击类型分布</h3>
        <div id="attackPieChart" style="height: 280px;"></div>
    </div>
</div>

<!-- 攻击日志表格 -->
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h3 style="margin: 0;"><i class="fas fa-list-ul"></i> 攻击事件日志</h3>
        <div>
            <button class="btn-secondary" onclick="filterLogs('all')">全部</button>
            <button class="btn-secondary" onclick="filterLogs('critical')">🔴 极端威胁</button>
            <button class="btn-secondary" onclick="filterLogs('high')">🟠 高危</button>
            <button class="btn-secondary" onclick="filterLogs('medium')">🟡 中危</button>
            <button class="btn-secondary" onclick="refreshData()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div id="attackLogsTable" style="overflow-x: auto;">
        <div style="text-align: center; color: #666; padding: 40px;">
            <i class="fas fa-spinner fa-spin"></i> 加载中...
        </div>
    </div>
</div>

<!-- 防火墙规则 -->
<div class="card">
    <h3><i class="fas fa-firewall"></i> 防火墙规则（模拟）</h3>
    <div style="display: flex; gap: 10px; margin: 20px 0;">
        <input type="text" id="firewallIp" placeholder="IP地址" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
        <input type="number" id="firewallPort" placeholder="端口" style="width: 100px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
        <select id="firewallAction" style="padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
            <option value="block">拦截</option>
            <option value="allow">放行</option>
        </select>
        <button class="btn-primary" onclick="addFirewallRule()">添加规则</button>
    </div>
    <div id="firewallRulesList">
        <div style="text-align: center; color: #666; padding: 20px;">暂无规则</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
let attackTrendChart = null;
let attackPieChart = null;
let allAttackLogs = [];
let currentSeverityFilter = 'all';

// 加载攻击统计
async function loadAttackStats() {
    try {
        const resp = await fetch('/api/attack/stats');
        const stats = await resp.json();

        document.getElementById('attackTotal').innerText = stats.total || 0;

        // 统计各类攻击数量
        let criticalCount = 0;
        let jailbreakCount = 0;
        let injectionCount = 0;

        stats.by_severity.forEach(s => {
            if (s.severity === 'critical') criticalCount = s.count;
            if (s.severity === 'high') jailbreakCount = s.count;
            if (s.severity === 'medium') injectionCount = s.count;
        });

        document.getElementById('criticalCount').innerText = criticalCount;
        document.getElementById('jailbreakCount').innerText = jailbreakCount;
        document.getElementById('injectionCount').innerText = injectionCount;

        // 更新饼图
        if (attackPieChart && stats.by_type.length > 0) {
            const typeNames = {
                'jailbreak': '越狱攻击',
                'prompt_injection': '提示注入',
                'encoding_bypass': '编码绕过',
                'extreme_threat': '极端威胁'
            };
            const pieData = stats.by_type.map(t => ({
                name: typeNames[t.type] || t.type,
                value: t.count
            }));
            attackPieChart.setOption({ series: [{ data: pieData }] });
        }

        // 更新趋势图
        if (attackTrendChart && stats.hourly_trend.length > 0) {
            const hours = stats.hourly_trend.map(t => t.hour + ':00');
            const counts = stats.hourly_trend.map(t => t.count);
            attackTrendChart.setOption({
                xAxis: { data: hours },
                series: [{ data: counts }]
            });
        }

    } catch(e) {
        console.error('加载攻击统计失败:', e);
    }
}

// 加载攻击日志
async function loadAttackLogs() {
    try {
        const resp = await fetch('/api/attack/logs?limit=100');
        allAttackLogs = await resp.json();
        renderAttackLogs();
    } catch(e) {
        console.error('加载攻击日志失败:', e);
        document.getElementById('attackLogsTable').innerHTML = '<div style="text-align: center; color: #ff5050; padding: 40px;">❌ 加载失败，请刷新重试</div>';
    }
}

// 渲染攻击日志
function renderAttackLogs() {
    let filtered = allAttackLogs;
    if (currentSeverityFilter !== 'all') {
        filtered = allAttackLogs.filter(log => log.severity === currentSeverityFilter);
    }

    const tableDiv = document.getElementById('attackLogsTable');
    if (filtered.length === 0) {
        tableDiv.innerHTML = `
            <div style="text-align: center; color: #666; padding: 60px;">
                <i class="fas fa-shield-alt" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                <div>暂无攻击记录</div>
                <div style="font-size: 12px; margin-top: 8px;">尝试输入恶意内容测试检测功能</div>
            </div>
        `;
        return;
    }

    const severityColors = {
        'critical': '#ff0000',
        'high': '#ff5050',
        'medium': '#ff8c00',
        'low': '#ffcc00'
    };

    const severityNames = {
        'critical': '🔴 极端威胁',
        'high': '🟠 高危',
        'medium': '🟡 中危',
        'low': '🟢 低危'
    };

    tableDiv.innerHTML = `
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr>
                    <th style="text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #aaa;">时间</th>
                    <th style="text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #aaa;">攻击类型</th>
                    <th style="text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #aaa;">攻击内容</th>
                    <th style="text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #aaa;">严重程度</th>
                    <th style="text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #aaa;">来源IP</th>
                </tr>
            </thead>
            <tbody>
                ${filtered.map(log => `
                    <tr style="cursor: pointer;" onclick="alert('详情: ${escapeHtml(log.description)}\\\\n内容: ${escapeHtml(log.attack_content)}')">
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #888; font-size: 12px;">${log.timestamp.replace('T', ' ').slice(0, 19)}</td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <span class="attack-badge" style="background: ${severityColors[log.severity]}20; color: ${severityColors[log.severity]}">
                                ${getAttackTypeName(log.attack_type)}
                            </span>
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ddd; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            ${escapeHtml(log.attack_content.substring(0, 60))}${log.attack_content.length > 60 ? '...' : ''}
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <span style="color: ${severityColors[log.severity]}">${severityNames[log.severity]}</span>
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #888;">${log.source_ip}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function getAttackTypeName(type) {
    const names = {
        'jailbreak': '越狱攻击',
        'prompt_injection': '提示注入',
        'encoding_bypass': '编码绕过',
        'extreme_threat': '极端威胁'
    };
    return names[type] || type;
}

// 按严重程度筛选
function filterBySeverity(severity) {
    currentSeverityFilter = severity;
    renderAttackLogs();
}

function filterLogs(severity) {
    currentSeverityFilter = severity;
    renderAttackLogs();
}

// 刷新所有数据
async function refreshData() {
    await loadAttackStats();
    await loadAttackLogs();
    showToast('数据已刷新', 'success');
}

// 显示提示
function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.style.cssText = `
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: ${type === 'success' ? 'rgba(0,200,100,0.9)' : 'rgba(255,80,80,0.9)'};
        backdrop-filter: blur(10px);
        color: white;
        padding: 12px 24px;
        border-radius: 40px;
        z-index: 9999;
        font-size: 14px;
        animation: fadeInOut 2.5s forwards;
    `;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// 添加防火墙规则
async function addFirewallRule() {
    const ip = document.getElementById('firewallIp').value.trim();
    const port = document.getElementById('firewallPort').value;
    const action = document.getElementById('firewallAction').value;

    if (!ip) {
        showToast('请输入IP地址', 'error');
        return;
    }

    try {
        const resp = await fetch('/api/firewall/rules', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ip: ip, port: port, action: action })
        });
        const data = await resp.json();
        if (data.success) {
            showToast('规则添加成功', 'success');
            document.getElementById('firewallIp').value = '';
            document.getElementById('firewallPort').value = '';
            loadFirewallRules();
        }
    } catch(e) {
        console.error('添加规则失败:', e);
        showToast('添加失败', 'error');
    }
}

// 加载防火墙规则
async function loadFirewallRules() {
    try {
        const resp = await fetch('/api/firewall/rules');
        const rules = await resp.json();

        const rulesDiv = document.getElementById('firewallRulesList');
        if (rules.length === 0) {
            rulesDiv.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">暂无规则</div>';
            return;
        }

        rulesDiv.innerHTML = rules.map(rule => `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <div>
                    <span style="color: #00d4ff;">${rule.ip}</span>
                    ${rule.port ? `<span style="color: #888;">:${rule.port}</span>` : ''}
                    <span style="margin-left: 10px; color: ${rule.action === 'block' ? '#ff5050' : '#48bb78'};">${rule.action === 'block' ? '🚫 拦截' : '✓ 放行'}</span>
                </div>
                <button onclick="deleteFirewallRule(${rule.id})" style="background: none; border: none; color: #888; cursor: pointer; font-size: 16px;">🗑️</button>
            </div>
        `).join('');
    } catch(e) {
        console.error('加载防火墙规则失败:', e);
    }
}

// 删除防火墙规则
async function deleteFirewallRule(ruleId) {
    try {
        const resp = await fetch(`/api/firewall/rules/${ruleId}`, { method: 'DELETE' });
        const data = await resp.json();
        if (data.success) {
            showToast('规则已删除', 'success');
            loadFirewallRules();
        }
    } catch(e) {
        console.error('删除规则失败:', e);
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 初始化图表
function initCharts() {
    attackTrendChart = echarts.init(document.getElementById('attackTrendChart'));
    attackTrendChart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { top: 30, left: 50, right: 20, bottom: 20 },
        xAxis: { type: 'category', name: '时间', axisLabel: { color: '#888' }, axisLine: { lineStyle: { color: '#333' } } },
        yAxis: { type: 'value', name: '攻击次数', axisLabel: { color: '#888' }, splitLine: { lineStyle: { color: '#222' } } },
        series: [{
            type: 'line', smooth: true, data: [],
            lineStyle: { color: '#ff5050', width: 3 },
            areaStyle: { opacity: 0.2, color: '#ff5050' },
            symbol: 'circle', symbolSize: 8,
            itemStyle: { color: '#ff5050', borderColor: '#0a0a0a', borderWidth: 2 }
        }]
    });

    attackPieChart = echarts.init(document.getElementById('attackPieChart'));
    attackPieChart.setOption({
        tooltip: { trigger: 'item' },
        series: [{
            type: 'pie', radius: ['45%', '70%'], center: ['50%', '50%'],
            data: [],
            label: { show: true, formatter: '{b}: {d}%', color: '#ccc' },
            itemStyle: { borderRadius: 8, borderColor: '#0a0a0a', borderWidth: 2 }
        }]
    });
}

// 定时刷新（每5秒）
let refreshInterval;
function startAutoRefresh() {
    refreshInterval = setInterval(() => {
        loadAttackStats();
        loadAttackLogs();
    }, 5000);
}

// 页面加载
initCharts();
loadAttackStats();
loadAttackLogs();
loadFirewallRules();
startAutoRefresh();

// 页面卸载时清除定时器
window.addEventListener('beforeunload', () => {
    if (refreshInterval) clearInterval(refreshInterval);
});
</script>
{% endblock %}
